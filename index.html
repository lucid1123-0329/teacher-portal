<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--nv:#1B2A4A;--nvl:#2C3E5A;--nvd:#0F1B33;--gd:#D4A843;--gdl:#F0D68A;--gdd:#B8902A;--bg:#F5F3EE;--cd:#FFF;--tx:#2D2D2D;--sb:#6B7280;--lt:#9CA3AF;--bd:#E5E2DB;--ok:#10B981;--okb:#D1FAE5;--wn:#F59E0B;--wnb:#FEF3C7;--er:#EF4444;--erb:#FEE2E2;--inf:#3B82F6;--infb:#DBEAFE;--r:12px;--rs:8px;--sh:0 2px 8px rgba(27,42,74,.08);--shl:0 8px 32px rgba(27,42,74,.12);--sw:260px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;min-height:100vh;overflow-x:hidden}.hidden{display:none!important}button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
#loginScreen{display:flex;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--nvd),var(--nv),var(--nvl));padding:24px}
.lbox{background:var(--cd);border-radius:20px;padding:48px 36px;width:100%;max-width:400px;box-shadow:var(--shl);text-align:center}

.bp{width:100%;padding:15px;background:var(--nv);color:#fff;border:none;border-radius:var(--rs);font-size:1rem;font-weight:600;transition:.2s;margin-top:6px}.bp:hover{background:var(--nvl)}.bp:disabled{opacity:.5;cursor:not-allowed}

.side-hd{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}.side-br{font-size:1.05rem;font-weight:700;color:var(--gdl)}.side-usr{font-size:.78rem;color:rgba(255,255,255,.6);margin-top:4px}

.blo{width:100%;padding:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);border-radius:var(--rs);font-size:.82rem;transition:.15s}.blo:hover{background:rgba(255,255,255,.15)}
.main{margin-left:var(--sw);flex:1;min-height:100vh}
.topbar{display:none;background:var(--nv);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;align-items:center;gap:12px}
.topbar-t{background:0;border:0;color:#fff;font-size:1.5rem;padding:4px}.topbar-ti{font-size:1rem;font-weight:600}
.pg{display:none;padding:24px;max-width:1100px;margin:0 auto}.pg.on{display:block}
.pt{font-size:1.35rem;font-weight:700;color:var(--nv);margin-bottom:4px}.pd{font-size:.85rem;color:var(--sb);margin-bottom:24px}
.cd{background:var(--cd);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
.ct{font-size:1rem;font-weight:600;color:var(--nv);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--cd);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border-left:4px solid var(--nv)}

.tw{overflow-x:auto}table.tb{width:100%;border-collapse:collapse;font-size:.85rem}.tb th{background:var(--nv);color:#fff;padding:10px 12px;text-align:left;font-weight:500;font-size:.78rem;white-space:nowrap}.tb td{padding:9px 12px;border-bottom:1px solid var(--bd)}.tb tr:hover td{background:rgba(212,168,67,.04)}
.bd{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.72rem;font-weight:600}.bdok{background:var(--okb);color:var(--ok)}.bdwn{background:var(--wnb);color:var(--wn)}.bder{background:var(--erb);color:var(--er)}.bdinf{background:var(--infb);color:var(--inf)}.bdnv{background:rgba(27,42,74,.1);color:var(--nv)}

.bs{padding:8px 16px;background:var(--nv);color:#fff;border:none;border-radius:var(--rs);font-size:.82rem;font-weight:500;transition:.15s}.bs:hover{background:var(--nvl)}.bgd{background:var(--gd);color:var(--nvd)}.bgd:hover{background:var(--gdd);color:#fff}

.cc{background:var(--cd);border-radius:var(--r);padding:18px;box-shadow:var(--sh);cursor:pointer;transition:.2s;border:2px solid transparent;display:flex;align-items:center;gap:14px}

.ci{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}.ci.k{background:#FEF3C7}.ci.e{background:#DBEAFE}.ci.m{background:#D1FAE5}
.cn{font-size:1rem;font-weight:600;color:var(--nv)}.cm{font-size:.78rem;color:var(--sb)}.cp{margin-left:auto;text-align:right;font-size:.85rem;font-weight:700;color:var(--nv)}
.etb{display:flex;align-items:center;gap:12px;margin-bottom:20px}.eback{background:0;border:2px solid var(--bd);border-radius:var(--rs);padding:8px 14px;font-size:.88rem;color:var(--nv);font-weight:500;transition:.15s}.eback:hover{border-color:var(--nv);background:rgba(27,42,74,.04)}
.scd{background:var(--cd);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;border-left:4px solid var(--bd);transition:.2s}.scd.dn{border-left-color:var(--ok)}
.shd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

.sbs{display:flex;gap:3px;flex-wrap:wrap}
.sb2{min-width:40px;height:34px;border:2px solid var(--bd);border-radius:6px;background:var(--bg);color:var(--sb);font-size:.7rem;font-weight:600;transition:.15s;padding:0 5px;white-space:nowrap}
.sb2:hover{border-color:var(--gd);color:var(--gdd)}.sb2.on{background:var(--nv);border-color:var(--nv);color:#fff;transform:scale(1.05)}
.ms{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}.ms label{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1.5px solid var(--bd);border-radius:16px;font-size:.7rem;color:var(--sb);cursor:pointer;transition:.15s;user-select:none}

.eta{width:100%;padding:10px 12px;border:2px solid var(--bd);border-radius:var(--rs);font-size:.85rem;color:var(--tx);background:var(--bg);resize:vertical;min-height:50px;outline:0;transition:.2s;margin-top:4px}.eta:focus{border-color:var(--gd)}
.efl{font-size:.76rem;font-weight:500;color:var(--sb);margin-top:8px;display:block}
.svb{position:fixed;bottom:0;left:var(--sw);right:0;background:var(--cd);padding:14px 24px;box-shadow:0 -4px 20px rgba(0,0,0,.1);z-index:100;display:none;align-items:center;justify-content:center;gap:16px}
.svi{font-size:.85rem;color:var(--sb)}.svi strong{color:var(--nv)}
.bsv{padding:12px 36px;background:var(--gd);color:var(--nvd);border:none;border-radius:var(--rs);font-size:1rem;font-weight:700;transition:.2s}.bsv:hover{background:var(--gdd);color:#fff}.bsv:disabled{opacity:.5;cursor:not-allowed}
.ecn{padding-bottom:80px}
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.pi{padding:12px 0;border-bottom:1px solid var(--bd)}.pil{font-size:.72rem;color:var(--sb);font-weight:500;margin-bottom:2px}.piv{font-size:.92rem;font-weight:500;color:var(--nv)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:var(--cd);border-radius:var(--r);padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl)}
.mdt{font-size:1.1rem;font-weight:700;color:var(--nv);margin-bottom:16px}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.bc{background:var(--bg);color:var(--sb);border:2px solid var(--bd);border-radius:var(--rs);font-size:.85rem;font-weight:500;padding:10px 20px;transition:.15s}.bc:hover{border-color:var(--nv);color:var(--nv)}
.tst{position:fixed;top:20px;right:20px;background:var(--nv);color:#fff;padding:14px 22px;border-radius:var(--r);font-size:.88rem;font-weight:500;box-shadow:var(--shl);z-index:1000;opacity:0;transform:translateY(-10px);transition:.3s;pointer-events:none;max-width:400px}
.tst.sh{opacity:1;transform:translateY(0)}.tst.ok{background:var(--ok)}.tst.er{background:var(--er)}
.ld{position:fixed;inset:0;background:rgba(245,243,238,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px)}
.spn{width:44px;height:44px;border:4px solid var(--bd);border-top-color:var(--nv);border-radius:50%;animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.ldt{margin-top:14px;font-size:.88rem;color:var(--sb)}
.emp{text-align:center;padding:48px 24px;color:var(--sb)}.emp .ej{font-size:2.5rem;margin-bottom:12px}
@media(max-width:768px){.side{transform:translateX(-100%)}.side.op{transform:translateX(0)}.main{margin-left:0}.topbar{display:flex}.svb{left:0}.sr{grid-template-columns:1fr 1fr}.pg2{grid-template-columns:1fr}.pg{padding:16px}}
@media(max-width:480px){.sb2{min-width:36px;height:30px;font-size:.66rem}.scl{width:56px;font-size:.7rem}.sr{grid-template-columns:1fr}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.an{animation:fu .4s ease both}
</style>
</head>

<script>
const API='https://script.google.com/macros/s/AKfycbyeW_1LFg6GNEPnpQZwI2a8VxAHhhEicm2vlyjbFbvmeY84we2c4C_FaPonZXg2Z1DoPg/exec';
const SE={'국어':'📖','영어':'🌐','수학':'📐'};const SC={'국어':'k','영어':'e','수학':'m'};
let S={t:null,tk:null,cf:null,cls:[],cc:null,sts:[],ev:{},allSt:[],allTc:[],pf:'p-dash'};

async function gA(a,p={}){const u=new URL(API);u.searchParams.set('action',a);Object.entries(p).forEach(([k,v])=>v!==undefined&&u.searchParams.set(k,v));const r=await fetch(u);return r.json();}
async function pA(d){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(d)});return r.json();}

const MN=[
{id:'p-dash',ic:'📊',lb:'대시보드',r:'all'},
{sec:'관리자',r:'관리자'},
{id:'p-acon',ic:'📞',lb:'신규 상담 관리',r:'관리자'},
{id:'p-ast',ic:'👨‍🎓',lb:'학생 관리',r:'관리자'},
{id:'p-acl',ic:'🏫',lb:'반 관리',r:'관리자'},
{id:'p-alog',ic:'📋',lb:'일일 평가 관리',r:'관리자'},
{id:'p-atc',ic:'👩‍🏫',lb:'강사 계정',r:'관리자'},
{sec:'공통',r:'all'},
{id:'p-rpt',ic:'📄',lb:'2주 리포트',r:'all'},
