<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>명불허전학원 관리 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--nv:#1B2A4A;--nvl:#2C3E5A;--nvd:#0F1B33;--gd:#D4A843;--gdl:#F0D68A;--gdd:#B8902A;
--bg:#F7F6F3;--cd:#FFF;--tx:#2D2D2D;--sb:#6B7280;--lt:#9CA3AF;--bd:#E8E5DE;
--ok:#10B981;--okb:#D1FAE5;--wn:#F59E0B;--wnb:#FEF3C7;--er:#EF4444;--erb:#FEE2E2;
--inf:#3B82F6;--infb:#DBEAFE;--r:14px;--rs:10px;--sh:0 1px 4px rgba(27,42,74,.06);--shl:0 6px 24px rgba(27,42,74,.1);--sw:260px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);line-height:1.65;min-height:100vh}
.hidden{display:none!important}button{font-family:inherit;cursor:pointer;border:none}input,select,textarea{font-family:inherit}
a{color:var(--inf);text-decoration:none}

/* LOGIN */
#loginScreen{display:flex;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--nvd),var(--nv) 60%,var(--nvl));padding:24px}
.lbox{background:var(--cd);border-radius:24px;padding:52px 40px;width:100%;max-width:420px;box-shadow:var(--shl);text-align:center}
.llogo{width:64px;height:64px;background:var(--nv);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--gd);margin-bottom:16px}
.ltitle{font-size:1.5rem;font-weight:700;color:var(--nv);letter-spacing:-.02em}.lsub{font-size:.85rem;color:var(--sb);margin-bottom:32px;margin-top:4px}
.fg{margin-bottom:16px;text-align:left}.fl{display:block;font-size:.75rem;font-weight:600;color:var(--sb);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;padding:14px 16px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.95rem;color:var(--tx);background:var(--bg);outline:0;transition:.2s}
.fi:focus{border-color:var(--gd);box-shadow:0 0 0 3px rgba(212,168,67,.12)}
.bp{width:100%;padding:16px;background:var(--nv);color:#fff;border-radius:var(--rs);font-size:1rem;font-weight:600;transition:.2s;margin-top:8px}
.bp:hover{background:var(--nvl)}.bp:disabled{opacity:.4;cursor:not-allowed}
.lerr{color:var(--er);font-size:.82rem;margin-top:12px;min-height:1.2em}

/* APP SHELL */
#app{display:none;min-height:100vh}#app.on{display:flex}
.side{width:var(--sw);background:var(--nv);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;transition:transform .3s;overflow-y:auto;-webkit-overflow-scrolling:touch}
.side-hd{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}.side-br{font-size:.95rem;font-weight:700;color:var(--gdl);letter-spacing:-.01em}
.side-usr{font-size:.78rem;color:rgba(255,255,255,.5);margin-top:6px}
.side-role{display:inline-block;background:var(--gd);color:var(--nvd);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px;vertical-align:middle}
.side-nav{flex:1;padding:16px 0}.nav-sec{padding:0 20px;margin-top:20px;margin-bottom:8px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.28)}
.ni{display:flex;align-items:center;gap:12px;padding:11px 20px;font-size:.85rem;color:rgba(255,255,255,.65);cursor:pointer;transition:.15s;border-left:3px solid transparent;font-weight:400}
.ni:hover{background:rgba(255,255,255,.05);color:#fff}.ni.on{background:rgba(212,168,67,.1);color:var(--gdl);border-left-color:var(--gd);font-weight:500}.ni .ic{font-size:1.05rem;width:20px;text-align:center}
.side-ft{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.blo{width:100%;padding:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:var(--rs);font-size:.8rem;transition:.15s}.blo:hover{background:rgba(255,255,255,.12)}

/* MAIN */
.main{margin-left:var(--sw);flex:1;min-height:100vh}
.topbar{display:none;background:var(--nv);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;align-items:center;gap:12px}
.topbar button{background:0;border:0;color:#fff;font-size:1.4rem;padding:4px}.topbar span{font-size:.95rem;font-weight:600}
.pg{display:none;padding:28px 24px 100px;max-width:1100px;margin:0 auto}.pg.on{display:block}
.pt{font-size:1.3rem;font-weight:700;color:var(--nv);letter-spacing:-.02em}.pd{font-size:.82rem;color:var(--sb);margin-top:2px;margin-bottom:24px}

/* CARDS */
.cd{background:var(--cd);border-radius:var(--r);padding:22px;box-shadow:var(--sh);margin-bottom:16px}
.ct{font-size:.95rem;font-weight:600;color:var(--nv);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* STATS */
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--cd);border-radius:var(--r);padding:20px;box-shadow:var(--sh);border-left:4px solid var(--nv)}
.sc.gd{border-left-color:var(--gd)}.sc.gn{border-left-color:var(--ok)}.sc.rd{border-left-color:var(--er)}
.sl{font-size:.72rem;color:var(--sb);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.sv{font-size:1.8rem;font-weight:700;color:var(--nv);line-height:1}.ss{font-size:.72rem;color:var(--lt);margin-top:4px}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}table.tb{width:100%;border-collapse:collapse;font-size:.82rem}
.tb th{background:var(--bg);color:var(--sb);padding:10px 12px;text-align:left;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--bd)}
.tb td{padding:10px 12px;border-bottom:1px solid var(--bd);color:var(--tx)}.tb tr:hover td{background:rgba(212,168,67,.03)}
.bd{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
.bdok{background:var(--okb);color:#065F46}.bdwn{background:var(--wnb);color:#92400E}.bder{background:var(--erb);color:#991B1B}.bdinf{background:var(--infb);color:#1E40AF}.bdnv{background:rgba(27,42,74,.08);color:var(--nv)}

/* TOOLBAR */
.tbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.tbar select,.tbar input[type=date],.tbar input[type=text]{padding:9px 14px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.85rem;background:var(--cd);color:var(--tx);outline:0}
.tbar select:focus,.tbar input:focus{border-color:var(--gd)}
.bs{padding:9px 18px;background:var(--nv);color:#fff;border-radius:var(--rs);font-size:.82rem;font-weight:500;transition:.15s}.bs:hover{background:var(--nvl)}
.bgd{background:var(--gd);color:var(--nvd)}.bgd:hover{background:var(--gdd);color:#fff}

/* CLASS GRID */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.cc{background:var(--cd);border-radius:var(--r);padding:20px;box-shadow:var(--sh);cursor:pointer;transition:.2s;border:2px solid transparent;display:flex;align-items:center;gap:16px}
.cc:hover{transform:translateY(-2px);box-shadow:var(--shl);border-color:var(--gd)}
.ci{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.ci.k{background:#FEF3C7}.ci.e{background:#DBEAFE}.ci.m{background:#D1FAE5}
.cn{font-size:1rem;font-weight:600;color:var(--nv)}.cm{font-size:.75rem;color:var(--sb);margin-top:2px}
.cp{margin-left:auto;text-align:right}.cp .pn{font-size:1.2rem;font-weight:700;color:var(--nv)}.cp .pp{font-size:.7rem;margin-top:2px}
.pbar{width:60px;height:6px;background:var(--bd);border-radius:3px;overflow:hidden;margin-top:4px;margin-left:auto}
.pbar-fill{height:100%;border-radius:3px;transition:width .3s}

/* EVAL */
.etb{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.eback{background:var(--cd);border:1.5px solid var(--bd);border-radius:var(--rs);padding:9px 16px;font-size:.85rem;color:var(--nv);font-weight:500;transition:.15s}
.eback:hover{border-color:var(--nv);background:var(--bg)}
.ecn{padding-bottom:80px}

/* STUDENT EVAL CARD — ACCORDION */
.scd{background:var(--cd);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;border-left:4px solid var(--bd);transition:.2s;overflow:hidden}
.scd.dn{border-left-color:var(--ok)}.scd.ab{border-left-color:var(--lt);opacity:.65}
.shd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none}
.shd:hover{background:rgba(0,0,0,.015)}
.sav{width:36px;height:36px;border-radius:50%;background:var(--nv);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.snm{font-weight:600;font-size:.95rem;color:var(--nv)}.sgr{font-size:.72rem;color:var(--sb)}
.shd-r{display:flex;align-items:center;gap:8px}
.abs-btn{padding:4px 12px;border-radius:16px;font-size:.7rem;font-weight:600;background:var(--bg);color:var(--sb);transition:.15s;border:1.5px solid var(--bd)}
.abs-btn.on{background:var(--er);color:#fff;border-color:var(--er)}
.sbody{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 20px}
.sbody.open{max-height:600px;padding:0 20px 20px}

/* SCORE BUTTONS */
.scr{display:flex;align-items:center;margin-bottom:10px;gap:8px}
.scl{width:52px;flex-shrink:0;font-size:.72rem;font-weight:600;color:var(--sb);text-align:right}
.sbs{display:flex;gap:4px;flex-wrap:wrap}
.sb2{min-width:52px;height:38px;border:1.5px solid var(--bd);border-radius:8px;background:var(--cd);color:var(--sb);font-size:.75rem;font-weight:600;transition:.15s;padding:0 8px}
.sb2:hover{border-color:var(--gd);color:var(--gdd)}.sb2.on{background:var(--nv);border-color:var(--nv);color:#fff}

/* MULTI SELECT CHIPS */
.ms{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.ms label{display:flex;align-items:center;gap:4px;padding:5px 12px;border:1.5px solid var(--bd);border-radius:20px;font-size:.72rem;color:var(--sb);cursor:pointer;transition:.15s;user-select:none}
.ms label.ck{background:var(--nv);border-color:var(--nv);color:#fff}.ms input{display:none}
.efl{font-size:.72rem;font-weight:600;color:var(--sb);margin-top:10px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.eta{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.85rem;color:var(--tx);background:var(--bg);resize:vertical;min-height:48px;outline:0;transition:.2s;margin-top:4px}.eta:focus{border-color:var(--gd)}

/* SAVE BAR */
.svb{position:fixed;bottom:0;left:var(--sw);right:0;background:var(--cd);padding:14px 24px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:100;display:none;align-items:center;justify-content:center;gap:16px}
.svi{font-size:.85rem;color:var(--sb)}.svi strong{color:var(--nv)}
.bsv{padding:13px 40px;background:var(--gd);color:var(--nvd);border-radius:var(--rs);font-size:1rem;font-weight:700;transition:.2s}.bsv:hover{background:var(--gdd);color:#fff}.bsv:disabled{opacity:.4;cursor:not-allowed}

/* PROFILE */
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.pi{padding:12px 0;border-bottom:1px solid var(--bd)}.pil{font-size:.68rem;color:var(--sb);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}.piv{font-size:.9rem;font-weight:500;color:var(--nv)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.md{background:var(--cd);border-radius:var(--r);padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl)}
.mdt{font-size:1.1rem;font-weight:700;color:var(--nv);margin-bottom:20px}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.bc{background:var(--bg);color:var(--sb);border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.85rem;font-weight:500;padding:10px 20px;transition:.15s}.bc:hover{border-color:var(--nv);color:var(--nv)}

/* TOAST + LOADING */
.tst{position:fixed;top:20px;right:20px;background:var(--nv);color:#fff;padding:14px 24px;border-radius:var(--r);font-size:.85rem;font-weight:500;box-shadow:var(--shl);z-index:1000;opacity:0;transform:translateY(-10px);transition:.3s;pointer-events:none;max-width:380px}
.tst.sh{opacity:1;transform:translateY(0)}.tst.ok{background:var(--ok)}.tst.er{background:var(--er)}
.ld{position:fixed;inset:0;background:rgba(247,246,243,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px)}
.spn{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--nv);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}.ldt{margin-top:14px;font-size:.85rem;color:var(--sb)}
.emp{text-align:center;padding:48px 24px;color:var(--sb)}.emp .ej{font-size:2.5rem;margin-bottom:12px}

/* RADAR CHART */
.radar-wrap{max-width:360px;margin:0 auto}

/* RESPONSIVE */
@media(max-width:768px){.side{transform:translateX(-100%)}.side.op{transform:translateX(0)}.main{margin-left:0}.topbar{display:flex}.svb{left:0}.sr{grid-template-columns:1fr 1fr}.pg2{grid-template-columns:1fr}.pg{padding:20px 16px 100px}}
@media(max-width:480px){.sb2{min-width:44px;height:34px;font-size:.7rem}.scl{width:44px;font-size:.68rem}.sr{grid-template-columns:1fr}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.an{animation:fu .35s ease both}
</style>
</head>
<body>
<div id="tst" class="tst"></div>
<div id="ld" class="ld hidden"><div class="spn"></div><div class="ldt" id="ldtx">로딩 중...</div></div>

<!-- LOGIN -->
<div id="loginScreen">
<div class="lbox an">
<div class="llogo">📋</div><h1 class="ltitle">명불허전학원</h1><p class="lsub">강사 관리 포털</p>
<div class="fg"><label class="fl">강사명</label><input type="text" id="lnm" class="fi" placeholder="이름을 입력하세요" autocomplete="off"></div>
<div class="fg"><label class="fl">비밀번호</label><input type="password" id="lpw" class="fi" placeholder="비밀번호를 입력하세요"></div>
<button id="lbtn" class="bp" onclick="doLogin()">로그인</button><p class="lerr" id="lerr"></p>
</div></div>

<!-- APP -->
<div id="app">
<aside class="side" id="side">
<div class="side-hd"><div class="side-br">명불허전 포털</div><div class="side-usr" id="sUsr"></div></div>
<nav class="side-nav" id="sNav"></nav>
<div class="side-ft"><button class="blo" onclick="doLogout()">로그아웃</button></div>
</aside>
<div class="topbar" id="topbar"><button onclick="document.getElementById('side').classList.toggle('op')">☰</button><span id="tbTi"></span></div>
<div class="main">

<!-- DASHBOARD -->
<div class="pg" id="p-dash"><h1 class="pt" id="dT"></h1><p class="pd" id="dD"></p><div class="sr" id="dS"></div><div id="dAdmin" style="display:none;margin-bottom:16px"><button class="bs bgd" onclick="doSync()" id="syncBtn" style="padding:10px 20px">🔄 counsel 성향분석 동기화</button><span id="syncResult" style="font-size:.82rem;color:var(--sb);margin-left:12px"></span></div><div class="cd"><div class="ct">📚 반별 평가 현황</div><div id="dC" class="cg"></div></div></div>

<!-- EVAL INPUT -->
<div class="pg" id="p-eval"><div class="etb"><button class="eback" onclick="nav('p-dash')">← 돌아가기</button><div><h1 class="pt" id="eT"></h1><p class="pd" id="eSb" style="margin-bottom:0"></p></div><span class="bd bdnv" id="eBd" style="margin-left:auto;font-size:.85rem;padding:6px 16px">0/0</span></div><div id="eL" class="ecn"></div></div>
<div class="svb" id="svb"><div class="svi"><strong id="svC">0</strong>명 입력 완료</div><button class="bsv" id="svBtn" onclick="doSave()" disabled>저장하기</button></div>

<!-- ADMIN PAGES -->
<div class="pg" id="p-alog"><h1 class="pt">일일 평가 관리</h1><p class="pd">날짜·강사·반별 평가 기록을 조회하고 수정합니다</p><div class="tbar" id="alTb"></div><div class="cd"><div class="tw"><table class="tb" id="alTbl"><thead></thead><tbody></tbody></table></div></div></div>

<div class="pg" id="p-ast"><h1 class="pt">학생 관리</h1><p class="pd">전체 학생 목록 · 등록 · 수정</p><div class="tbar"><input type="text" id="stSrch" placeholder="이름·학교 검색" oninput="fSt()"><button class="bs bgd" onclick="oSM()">+ 학생 추가</button></div><div class="cd"><div class="tw"><table class="tb" id="stTbl"><thead></thead><tbody></tbody></table></div></div></div>

<div class="pg" id="p-acl"><h1 class="pt">반 관리</h1><p class="pd">반 구조 · 담당 교사 · 학생 배정</p><div class="tbar"><button class="bs bgd" onclick="oCM()">+ 반 추가</button></div><div class="cd"><div class="tw"><table class="tb" id="clTbl"><thead></thead><tbody></tbody></table></div></div></div>

<div class="pg" id="p-atc"><h1 class="pt">강사 계정 관리</h1><p class="pd">계정 생성 · 수정 · 비활성화</p><div class="tbar"><button class="bs bgd" onclick="oTM()">+ 강사 추가</button></div><div class="cd"><div class="tw"><table class="tb" id="tcTbl"><thead></thead><tbody></tbody></table></div></div></div>

<!-- COMMON: PERSONALITY -->
<div class="pg" id="p-psy"><h1 class="pt">학생 성향 조회</h1><p class="pd">입학 시 성향검사 AI 분석 결과를 조회합니다</p><div class="tbar"><input type="text" id="psySrch" placeholder="학생 이름 검색" oninput="fPsy()"></div><div id="psyList" class="cd"></div></div>

<!-- COMMON: REPORTS -->
<div class="pg" id="p-rpt"><h1 class="pt">2주 리포트</h1><p class="pd">학생 프로필에서 리포트를 확인하세요</p><div class="tbar"><input type="text" id="rpSrch" placeholder="학생 이름 검색" oninput="fRp()"></div><div class="cd" id="rpL"></div></div>

<!-- PROFILE -->
<div class="pg" id="p-prof"><div class="etb"><button class="eback" id="prBk" onclick="nav(S.pf)">← 돌아가기</button><h1 class="pt" id="prTi">프로필</h1></div><div id="prC"></div></div>

</div></div>

<!-- MODALS -->
<div id="smMo" class="mo hidden"><div class="md"><div class="mdt" id="smTi">학생 추가</div>
<div class="fg"><label class="fl">학생명</label><input type="text" id="sm_n" class="fi"></div>
<div class="fg"><label class="fl">학년</label><select id="sm_g" class="fi"><option value="">선택</option><option>초1</option><option>초2</option><option>초3</option><option>초4</option><option>초5</option><option>초6</option><option>중1</option><option>중2</option><option>중3</option><option>고1</option><option>고2</option><option>고3</option></select></div>
<div class="fg"><label class="fl">학교</label><input type="text" id="sm_s" class="fi"></div>
<div class="fg"><label class="fl">학부모 연락처</label><input type="text" id="sm_p" class="fi" placeholder="010-0000-0000"></div>
<div class="fg"><label class="fl">학생 연락처</label><input type="text" id="sm_ph" class="fi"></div>
<div class="fg"><label class="fl">재원 여부</label><select id="sm_st" class="fi"><option>재원</option><option>퇴원</option></select></div>
<div class="ma"><button class="bc" onclick="cM('smMo')">취소</button><button class="bs" onclick="svSt()">저장</button></div></div></div>

<div id="tmMo" class="mo hidden"><div class="md"><div class="mdt" id="tmTi">강사 추가</div>
<div class="fg"><label class="fl">강사명</label><input type="text" id="tm_n" class="fi"></div>
<div class="fg"><label class="fl">과목</label><select id="tm_sb" class="fi"><option>국어</option><option>영어</option><option>수학</option></select></div>
<div class="fg"><label class="fl">비밀번호</label><input type="text" id="tm_pw" class="fi"></div>
<div class="fg"><label class="fl">역할</label><select id="tm_rl" class="fi"><option>강사</option><option>관리자</option></select></div>
<div class="fg"><label class="fl">로그식별자</label><input type="text" id="tm_li" class="fi" placeholder="과목_이름"></div>
<div class="fg"><label class="fl">상태</label><select id="tm_ss" class="fi"><option>활성</option><option>비활성</option></select></div>
<div class="ma"><button class="bc" onclick="cM('tmMo')">취소</button><button class="bs" onclick="svTc()">저장</button></div></div></div>

<!-- CLASS MODAL (#4) -->
<div id="clMo" class="mo hidden"><div class="md"><div class="mdt" id="clMoTi">반 추가</div>
<div class="fg"><label class="fl">반 이름</label><input type="text" id="cl_n" class="fi"></div>
<div class="fg"><label class="fl">과목</label><select id="cl_sb" class="fi"><option>국어</option><option>영어</option><option>수학</option></select></div>
<div class="fg"><label class="fl">반 레벨</label><input type="text" id="cl_lv" class="fi" placeholder="예: A반, 기초"></div>
<div class="fg"><label class="fl">담당 교사 (쉼표 구분)</label><input type="text" id="cl_tc" class="fi" placeholder="김남선, 강민수"></div>
<div class="ma"><button class="bc" onclick="cM('clMo')">취소</button><button class="bs" onclick="svCl()">저장</button></div></div></div>

<script>
const API='/api/gs';
const SE={'국어':'📖','영어':'🌐','수학':'📐'};const SC={'국어':'k','영어':'e','수학':'m'};
let S={t:null,tk:null,cf:null,cls:[],cc:null,sts:[],ev:{},absent:{},allSt:[],allTc:[],pf:'p-dash',editCl:null};

async function gA(a,p={}){const u=new URL(API,location.origin);u.searchParams.set('action',a);Object.entries(p).forEach(([k,v])=>v!==undefined&&u.searchParams.set(k,v));const r=await fetch(u);return r.json();}
async function pA(d){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(d)});return r.json();}

const MN=[
{id:'p-dash',ic:'📊',lb:'대시보드',r:'all'},
{sec:'관리자',r:'관리자'},
{id:'p-acon',ic:'📞',lb:'신규 상담 관리',r:'관리자',ext:'https://counsel.trueasheard.com'},
{id:'p-ast',ic:'👨‍🎓',lb:'학생 관리',r:'관리자'},
{id:'p-acl',ic:'🏫',lb:'반 관리',r:'관리자'},
{id:'p-alog',ic:'📋',lb:'일일 평가 관리',r:'관리자'},
{id:'p-atc',ic:'👩‍🏫',lb:'강사 계정',r:'관리자'},
{sec:'공통',r:'all'},
{id:'p-psy',ic:'🧠',lb:'학생 성향 조회',r:'all'},
{id:'p-rpt',ic:'📄',lb:'2주 리포트',r:'all'},
];

function bNav(){const n=$('sNav');const rl=S.t.role;let h='';
for(const m of MN){if(m.sec){if(m.r!=='all'&&m.r!==rl)continue;h+=`<div class="nav-sec">${m.sec}</div>`;}
else{if(m.r!=='all'&&m.r!==rl)continue;
if(m.ext){h+=`<div class="ni" onclick="window.open('${m.ext}','_blank')"><span class="ic">${m.ic}</span>${m.lb} ↗</div>`;}
else{h+=`<div class="ni" data-p="${m.id}" onclick="nav('${m.id}')"><span class="ic">${m.ic}</span>${m.lb}</div>`;}}}
n.innerHTML=h;}

function nav(pid){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
const pg=$(pid);if(pg)pg.classList.add('on');const ni=document.querySelector(`.ni[data-p="${pid}"]`);if(ni)ni.classList.add('on');
$('tbTi').textContent=ni?ni.textContent.trim():'';$('svb').style.display=pid==='p-eval'?'flex':'none';
$('side').classList.remove('op');lPg(pid);}

async function lPg(p){try{switch(p){case'p-dash':await lDash();break;case'p-alog':await lALog();break;case'p-ast':await lSts();break;case'p-acl':await lCls();break;case'p-atc':await lTcs();break;case'p-rpt':await lRpt();break;case'p-psy':await lPsy();break;}}catch(e){ts(e.message,'er');}}

// LOGIN
async function doLogin(){const nm=$('lnm').value.trim(),pw=$('lpw').value.trim(),er=$('lerr'),bt=$('lbtn');
if(!nm||!pw){er.textContent='이름과 비밀번호를 입력하세요';return;}
bt.disabled=true;bt.textContent='로그인 중...';er.textContent='';
try{const r=await gA('tp_login',{name:nm,pw});if(r.ok){S.t=r.teacher;S.tk=r.token;sessionStorage.setItem('tp',JSON.stringify({t:r.teacher,tk:r.token}));enter();}else er.textContent=r.error||'실패';}
catch(e){er.textContent='서버 연결 실패';}finally{bt.disabled=false;bt.textContent='로그인';}}
function doLogout(){S={t:null,tk:null,cf:null,cls:[],cc:null,sts:[],ev:{},absent:{},allSt:[],allTc:[],pf:'p-dash',editCl:null};sessionStorage.removeItem('tp');$('app').classList.remove('on');$('loginScreen').style.display='flex';$('lnm').value='';$('lpw').value='';}
async function enter(){$('loginScreen').style.display='none';$('app').classList.add('on');$('sUsr').innerHTML=`${S.t.name} 선생님 <span class="side-role">${S.t.role}</span>`;bNav();try{const c=await gA('tp_config',{token:S.tk});if(c.ok)S.cf=c;}catch(e){}nav('p-dash');}

// DASHBOARD
async function lDash(){$('dAdmin').style.display=S.t.role==='관리자'?'block':'none';sh('대시보드 로딩...');const r=await gA('tp_todayStatus',{teacher:S.t.name,role:S.t.role,token:S.tk});hd();if(!r.ok){ts(r.error,'er');return;}
const d=new Date(),dy=['일','월','화','수','목','금','토'];
$('dT').textContent=S.t.role==='관리자'?'전체 현황 대시보드':`${S.t.name} 선생님`;
$('dD').textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${dy[d.getDay()]})`;
const pc=r.totalStudents>0?Math.round(r.completedStudents/r.totalStudents*100):0;
$('dS').innerHTML=`<div class="sc an"><div class="sl">전체 학생</div><div class="sv">${r.totalStudents}</div><div class="ss">명</div></div>
<div class="sc gd an"><div class="sl">오늘 입력</div><div class="sv">${r.completedStudents}</div><div class="ss">/ ${r.totalStudents}명</div></div>
<div class="sc gn an"><div class="sl">달성률</div><div class="sv">${pc}%</div></div>
<div class="sc${pc<100?' rd':''} an"><div class="sl">미입력</div><div class="sv">${r.totalStudents-r.completedStudents}</div><div class="ss">명</div></div>`;
const cl=$('dC');
if(!r.classes||!r.classes.length){cl.innerHTML='<div class="emp"><div class="ej">📭</div><p>담당 반이 없습니다</p></div>';return;}
cl.innerHTML=r.classes.map(c=>{const em=SE[c.subject]||'📚';const cs=SC[c.subject]||'k';const p=c.total>0?Math.round(c.completed/c.total*100):0;
const clr=p===100?'var(--ok)':p>0?'var(--gd)':'var(--bd)';
return`<div class="cc an" onclick="oC('${esc(c.name)}')"><div class="ci ${cs}">${em}</div><div><div class="cn">${c.name}</div><div class="cm">${c.subject} · ${c.total}명</div></div>
<div class="cp"><div class="pn">${c.completed}/${c.total}</div><div class="pbar"><div class="pbar-fill" style="width:${p}%;background:${clr}"></div></div></div></div>`;}).join('');}

// EVAL INPUT
async function oC(cn){sh('학생 목록 로딩...');S.cc=cn;S.ev={};S.absent={};const r=await gA('tp_students',{className:cn,token:S.tk});hd();
if(!r.ok){ts(r.error,'er');return;}S.sts=r.students;$('eT').textContent=cn;$('eSb').textContent=`${r.subject} · ${r.students.length}명`;
rEL(r.students);nav('p-eval');$('svb').style.display='flex';}

function rEL(sts){const cfg=S.cf||{};const scales=cfg.scales||['5점 (완벽)','4점 (우수)','3점 (보통)','2점 (미흡)','1점 (불량)'];
const gp=cfg.growthPts||[];const wk=cfg.weaknesses||[];const mg=cfg.mgmtAreas||[];const ua=cfg.urgentActions||[];
$('eL').innerHTML=sts.map((st,i)=>{
const shortScales=scales.map(s=>{const m=s.match(/(\d)점\s*\((.+)\)/);return m?{v:s,label:`${m[1]} ${m[2]}`}:{v:s,label:s};});
const sb=(f)=>shortScales.map(s=>`<button class="sb2" data-s="${esc(st.name)}" data-f="${f}" data-v="${esc(s.v)}" onclick="sS(this)">${s.label}</button>`).join('');
const mc=(items,f)=>items.length?`<div class="ms">${items.map(it=>`<label><input type="checkbox" data-s="${esc(st.name)}" data-f="${f}" value="${esc(it)}" onchange="uM('${esc(st.name)}','${f}')">${it}</label>`).join('')}</div>`:'';
const rc=(items,f)=>items.length?`<div class="ms">${items.map(it=>`<label><input type="radio" name="r${i}_${f}" data-s="${esc(st.name)}" data-f="${f}" value="${esc(it)}" onchange="sR(this)">${it}</label>`).join('')}</div>`:'';
return`<div class="scd an" id="c${i}">
<div class="shd" onclick="tglCard(${i})"><div style="display:flex;align-items:center;gap:12px"><div class="sav">${st.name[0]}</div><div><div class="snm">${st.name}</div><div class="sgr">${st.grade} · ${st.school||''}</div></div></div>
<div class="shd-r"><button class="abs-btn" id="ab${i}" onclick="event.stopPropagation();tglAbs(${i},'${esc(st.name)}')">결석</button><span class="bd bdwn" id="s${i}">미입력</span></div></div>
<div class="sbody" id="bd${i}">
<div class="scr"><div class="scl">과제</div><div class="sbs">${sb('hw')}</div></div>
<div class="scr"><div class="scl">이해도</div><div class="sbs">${sb('ud')}</div></div>
<div class="scr"><div class="scl">집중도</div><div class="sbs">${sb('fc')}</div></div>
<div class="scr"><div class="scl">끈기</div><div class="sbs">${sb('ps')}</div></div>
${gp.length?`<div class="efl">성장 포인트</div>${mc(gp,'gp')}`:''}
${wk.length?`<div class="efl">학업 약점</div>${mc(wk,'wk')}`:''}
${mg.length?`<div class="efl">관리 영역</div>${mc(mg,'mg')}`:''}
${ua.length?`<div class="efl">긴급 조치</div>${rc(ua,'ua')}`:''}
<div class="efl">종합 코멘트</div><textarea class="eta" placeholder="오늘 수업에 대한 코멘트를 입력하세요" data-s="${esc(st.name)}" data-f="cm" oninput="sT(this)"></textarea>
</div></div>`;}).join('');uEP();}

function tglCard(i){const bd=$(`bd${i}`);bd.classList.toggle('open');}
function tglAbs(i,sn){const btn=$(`ab${i}`);const isAbs=!btn.classList.contains('on');btn.classList.toggle('on');S.absent[sn]=isAbs;
const bd=$(`bd${i}`);const card=$(`c${i}`);
if(isAbs){bd.classList.remove('open');card.classList.add('ab');if(!S.ev[sn])S.ev[sn]={};S.ev[sn]._absent=true;}
else{card.classList.remove('ab');if(S.ev[sn])delete S.ev[sn]._absent;}
uCS(sn);uEP();}

function sS(b){const{s,f,v}=b.dataset;b.parentElement.querySelectorAll('.sb2').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(!S.ev[s])S.ev[s]={};S.ev[s][f]=v;uCS(s);uEP();}
function uM(sn,f){const ch=document.querySelectorAll(`input[type=checkbox][data-s="${sn}"][data-f="${f}"]`);ch.forEach(c=>c.parentElement.classList.toggle('ck',c.checked));if(!S.ev[sn])S.ev[sn]={};S.ev[sn][f]=Array.from(ch).filter(c=>c.checked).map(c=>c.value).join(', ');}
function sR(r){const{s,f}=r.dataset;if(!S.ev[s])S.ev[s]={};S.ev[s][f]=r.value;r.closest('.ms').querySelectorAll('label').forEach(l=>l.classList.toggle('ck',l.querySelector('input').checked));}
function sT(el){const{s,f}=el.dataset;if(!S.ev[s])S.ev[s]={};S.ev[s][f]=el.value;}
function uCS(sn){const e=S.ev[sn]||{};const i=S.sts.findIndex(x=>x.name===sn);if(i<0)return;
const isAbs=e._absent||S.absent[sn];const dn=isAbs||(e.hw&&e.ud&&e.fc&&e.ps);
const bd=$(`s${i}`),cd=$(`c${i}`);
if(isAbs){bd.textContent='결석';bd.className='bd bder';cd.classList.add('dn');}
else if(dn){bd.textContent='완료';bd.className='bd bdok';cd.classList.add('dn');}
else if(Object.keys(e).length>0){bd.textContent='입력중';bd.className='bd bdwn';cd.classList.remove('dn');}
else{bd.textContent='미입력';bd.className='bd bdwn';cd.classList.remove('dn');}}

function uEP(){let d=0;S.sts.forEach(st=>{const e=S.ev[st.name]||{};const isAbs=e._absent||S.absent[st.name];
if(isAbs||(e.hw&&e.ud&&e.fc&&e.ps))d++;});
$('eBd').textContent=`${d}/${S.sts.length}`;$('svC').textContent=d;$('svBtn').disabled=d===0;}

async function doSave(){const btn=$('svBtn');btn.disabled=true;btn.textContent='저장 중...';
const evs=[];S.sts.forEach(st=>{const e=S.ev[st.name]||{};const isAbs=e._absent||S.absent[st.name];
if(!isAbs&&(!e.hw||!e.ud||!e.fc||!e.ps))return;
evs.push({studentName:st.name,className:S.cc,isAbsent:!!isAbs,homework:e.hw||'',understanding:e.ud||'',focus:e.fc||'',persistence:e.ps||'',
growthPoints:e.gp||'',weaknesses:e.wk||'',mgmtAreas:e.mg||'',urgentAction:e.ua||'',comment:e.cm||''});});
if(!evs.length){ts('저장할 평가가 없습니다','er');btn.disabled=false;btn.textContent='저장하기';return;}
try{const r=await pA({action:'tp_saveEval',evaluations:evs,teacherLogId:S.t.logId,token:S.tk});
if(r.ok){ts('✅ '+r.message,'ok');setTimeout(()=>nav('p-dash'),1000);}else ts(r.error||'실패','er');}
catch(e){ts('서버 연결 실패. 재시도 해주세요.','er');}finally{btn.disabled=false;btn.textContent='저장하기';}}

// COUNSEL SYNC
async function doSync(){const btn=$('syncBtn');const res=$('syncResult');btn.disabled=true;btn.textContent='🔄 동기화 중...';res.textContent='';
try{const r=await gA('tp_admin_syncCounsel',{token:S.tk});
if(r.ok){res.textContent=r.message;ts('✅ '+r.message,'ok');}else{res.textContent=r.error;ts(r.error,'er');}}
catch(e){res.textContent='서버 연결 실패';ts('동기화 실패','er');}
finally{btn.disabled=false;btn.textContent='🔄 counsel 성향분석 동기화';}}

// EVAL LOG
async function lALog(){$('alTb').innerHTML=`<input type="date" id="eld" value="${new Date().toISOString().slice(0,10)}" onchange="fAL()"><input type="text" id="elt" placeholder="강사"><input type="text" id="elc" placeholder="반"><button class="bs" onclick="fAL()">조회</button>`;fAL();}
async function fAL(){sh('조회 중...');const d=$('eld').value,t=$('elt').value.trim(),c=$('elc').value.trim();
const r=await gA('tp_admin_evalLog',{token:S.tk,date:d||undefined,teacher:t||undefined,className:c||undefined});hd();if(!r.ok){ts(r.error,'er');return;}
const tbl=$('alTbl');tbl.querySelector('thead').innerHTML='<tr><th>교사</th><th>날짜</th><th>반</th><th>학생</th><th>과제</th><th>이해</th><th>집중</th><th>끈기</th><th>코멘트</th></tr>';
tbl.querySelector('tbody').innerHTML=r.logs.map(l=>`<tr><td>${l.teacher}</td><td>${l.date}</td><td>${l.className}</td><td><a href="#" onclick="oPr('${esc(l.student)}','p-alog');return false">${l.student}</a></td>
<td>${sS2(l.homework)}</td><td>${sS2(l.understanding)}</td><td>${sS2(l.focus)}</td><td>${sS2(l.persistence)}</td>
<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.comment||''}</td></tr>`).join('')||'<tr><td colspan=9 style="text-align:center;color:var(--sb);padding:32px">해당 조건의 기록이 없습니다</td></tr>';}

// STUDENTS
async function lSts(){sh('학생 로딩...');const r=await gA('tp_admin_allStudents',{token:S.tk});hd();if(!r.ok)return;S.allSt=r.students;rST(r.students);}
function rST(sts){const t=$('stTbl');t.querySelector('thead').innerHTML='<tr><th>이름</th><th>학년</th><th>학교</th><th>상태</th><th>수강반</th><th></th></tr>';
t.querySelector('tbody').innerHTML=sts.map(s=>`<tr><td><a href="#" onclick="oPr('${esc(s.name)}','p-ast');return false">${s.name}</a></td><td>${s.grade}</td><td>${s.school||''}</td>
<td><span class="bd ${s.status==='재원'?'bdok':'bder'}">${s.status||'재원'}</span></td>
<td style="font-size:.72rem;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(s.classes||[]).join(', ')}</td>
<td><button class="bs" style="padding:4px 10px;font-size:.7rem" onclick="eSt('${esc(s.name)}')">수정</button></td></tr>`).join('');}
function fSt(){const q=$('stSrch').value.trim().toLowerCase();rST(S.allSt.filter(s=>s.name.toLowerCase().includes(q)||(s.school||'').toLowerCase().includes(q)));}
function oSM(d){$('smTi').textContent=d?'학생 정보 수정':'학생 추가';$('sm_n').value=d?.name||'';$('sm_g').value=d?.grade||'';$('sm_s').value=d?.school||'';$('sm_p').value=d?.parentPhone||'';$('sm_ph').value=d?.studentPhone||'';$('sm_st').value=d?.status||'재원';$('sm_n').readOnly=!!d;$('smMo').classList.remove('hidden');}
function eSt(n){const s=S.allSt.find(x=>x.name===n);if(s)oSM(s);}
async function svSt(){const st={name:$('sm_n').value.trim(),grade:$('sm_g').value,school:$('sm_s').value.trim(),parentPhone:$('sm_p').value.trim(),studentPhone:$('sm_ph').value.trim(),status:$('sm_st').value};
if(!st.name){ts('학생명을 입력하세요','er');return;}sh('저장 중...');const r=await pA({action:'tp_admin_saveStudent',student:st,token:S.tk});hd();cM('smMo');if(r.ok){ts(r.message,'ok');lSts();}else ts(r.error,'er');}

// CLASSES (#4 — CRUD 추가)
async function lCls(){sh('반 목록 로딩...');const r=await gA('tp_admin_allClasses',{token:S.tk});hd();if(!r.ok)return;S.cls=r.classes||[];
const t=$('clTbl');t.querySelector('thead').innerHTML='<tr><th>반 이름</th><th>과목</th><th>레벨</th><th>담당 교사</th><th>학생수</th><th></th></tr>';
t.querySelector('tbody').innerHTML=r.classes.map(c=>`<tr><td style="font-weight:600;color:var(--nv)">${c.name}</td><td><span class="bd bdnv">${c.subject}</span></td><td>${c.level||''}</td>
<td style="font-size:.75rem">${c.teachers||''}</td><td style="font-weight:600">${c.studentCount}</td>
<td><button class="bs" style="padding:4px 10px;font-size:.7rem" onclick="eCl('${esc(c.name)}')">수정</button></td></tr>`).join('');}
function oCM(d){$('clMoTi').textContent=d?'반 수정':'반 추가';$('cl_n').value=d?.name||'';$('cl_sb').value=d?.subject||'국어';$('cl_lv').value=d?.level||'';$('cl_tc').value=d?.teachers||'';
$('cl_n').readOnly=!!d;S.editCl=d?.name||null;$('clMo').classList.remove('hidden');}
function eCl(n){const c=S.cls.find(x=>x.name===n);if(c)oCM(c);}
async function svCl(){const ci={name:$('cl_n').value.trim(),subject:$('cl_sb').value,level:$('cl_lv').value.trim(),teachers:$('cl_tc').value.trim(),originalName:S.editCl||''};
